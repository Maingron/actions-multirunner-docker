# Example runner inventory. Mount your real file over
# /etc/github-runners/config.yml at runtime.
#
# Per-runner fields:
#   title      - unique runner name prefix (ephemeral runners append a
#                timestamp + counter so names don't collide across jobs)
#   repo_url   - full URL of the repo (or org) the runner registers against
#   pat        - personal access token used to mint per-job JIT configs.
#                Overrides defaults.pat / $GITHUB_PAT.
#                Fine-grained PATs work: they need
#                   repo: "Administration" = read & write
#                   org:  "Self-hosted runners" = read & write
#                Classic PATs also work (scope: repo, or admin:org).
#   token      - only used when ephemeral: false. Static registration token
#                (≈1h lifetime). Ignored when `pat` is set (a fresh one is
#                fetched then).
#   ephemeral  - true (default) or false. Overrides defaults.ephemeral.
#   workdir    - optional, relative to /home/github-runner. Defaults to
#                "<repo_name>/<title>".
#   labels     - optional CSV, defaults to "self-hosted,linux,x64"
#   idle_regeneration - optional, seconds. If >0 the ephemeral runner is
#                  killed and rotated after this many seconds without a job.
#                  The runner is deregistered via API, then a fresh JIT
#                  config is minted. 0 / unset disables it. Ignored for
#                  ephemeral: false.
#   image      - optional, docker base image. Any image that has apt +
#                glibc works. Examples:
#                   debian:stable-slim   (default)
#                   debian:bookworm
#                   debian:trixie
#                   ubuntu:24.04
#                   ubuntu:22.04
#                Each unique image becomes one docker-compose service --
#                run `./render.sh` after editing the inventory to
#                regenerate docker-compose.yml, then `docker compose up`
#                (or just run `./start.sh`, which does both).
#                A runner is only launched by the container whose image
#                matches.
#   startup_script - optional, filename inside ./startup-scripts/ (repo
#                    root). Runs once per container, as root via sudo,
#                    before any runner starts. Use it for custom shell
#                    logic (fetching binaries, writing config files,
#                    building from source, ...). Duplicate references
#                    across runners are deduped. See
#                    startup-scripts/README.md.
#   additional_packages - optional list of package names to install via
#                    the container's native package manager (autodetected:
#                    apt / dnf / apk / zypper / pacman). Accepts a YAML
#                    list: ["nodejs", "npm", "php-cli"] or a single
#                    space/comma-separated string. The union across all
#                    runners in a container is installed once before
#                    runners start.
#   docker         - optional mapping. Set `docker.enabled: true` to let
#                    jobs on this runner use `docker` / `docker compose`
#                    (builds, testcontainers, ...). Each image group that
#                    has at least one docker-enabled runner gets its OWN
#                    `docker:dind` sidecar on a private compose network,
#                    so jobs see only containers they themselves spawn --
#                    never the host's containers, never sibling groups'
#                    containers. The host docker socket is NOT exposed.
#                    The sidecar runs privileged (unavoidable for in-
#                    container dockerd); the runner itself does not.
#   instances      - optional mapping. Spawn a pool of runners from a
#                    single config entry. All three keys are optional.
#                      min      - always keep at least this many runners
#                                 alive (default 1). Floor on the pool
#                                 size regardless of load.
#                      max      - hard cap on concurrent runners for
#                                 this entry (default = min). Scaling
#                                 will never exceed this.
#                      headroom - minimum number of IDLE (free) workers
#                                 to keep ready at all times (default 0).
#                                 Whenever fewer than `headroom` runners
#                                 are idle, new ones are spawned up to
#                                 `max`. Use this to hide spin-up latency
#                                 for bursty workloads -- jobs always
#                                 land on a warm, waiting runner.
#                    Formula: desired = clamp(busy + headroom, min, max).
#                    In plain English: "keep `headroom` workers free, up
#                    to `max`, never below `min`".
#                    Example -- 2 baseline, keep 3 spare, cap at 15:
#                      instances:
#                        min: 2
#                        max: 15
#                        headroom: 3
#                    Each instance gets a 2-digit suffix in its title
#                    and workdir (e.g. `build-01-01`, `build-01-02`, ...)
#                    so GitHub-side runner names stay unique. When
#                    min=max=1 the behaviour is unchanged from
#                    single-instance mode (no suffix is added).
#                    Dynamic scaling is most useful with ephemeral
#                    runners; for persistent runners the pool behaves as
#                    a static fleet of `min` runners unless headroom is
#                    set.
#
# `defaults` applies to every runner unless overridden. `pat` can also come
# from the GITHUB_PAT env var so you never have to put it in the file.

general:
  # Remove containers named `github-multirunner-*` that are no longer part of
  # the rendered compose file (e.g. after removing an `image:` from the
  # inventory, or renaming slugs). Off by default -- opt in if you want
  # `./start.sh` to tidy up stale containers automatically.
  autoprune: false

defaults:
  ephemeral: true
  image: debian:stable-slim
  idle_regeneration: 0                      # 0 = disabled; e.g. 3600 = rotate idle runners every hour
  # startup_script: common-deps.sh          # runs once per container as root
  # additional_packages: [curl, build-essential]
  # pat: github_pat_xxxxxxxxxxxxxxxxxxxx    # or set GITHUB_PAT in the environment

runners:
  # Ephemeral JIT runner (recommended). Auto-deregisters after each job;
  # no /actions/runner-registration call, no registration-token tango.
  - title: build-01
    repo_url: https://github.com/your-org/your-repo
    pat: github_pat_yyyyyyyyyyyyyyyyyyyy

  # Same, with custom workdir + labels.
  - title: build-02
    repo_url: https://github.com/your-org/your-repo
    workdir: your-repo/build-02
    labels: self-hosted,linux,x64,fast

  # Long-lived runner: registers once, keeps the session across jobs.
  # Token is auto-fetched via PAT; falls back to `token:` if no PAT.
  - title: persistent-01
    repo_url: https://github.com/your-org/your-repo
    ephemeral: false
    workdir: your-repo/persistent-01

  # Org-level ephemeral runner.
  - title: org-runner-01
    repo_url: https://github.com/your-org
    pat: github_pat_zzzzzzzzzzzzzzzzzzzz

  # Ephemeral runner on a different base image.
  - title: ubuntu-01
    repo_url: https://github.com/your-org/your-repo
    image: ubuntu:24.04
    pat: github_pat_yyyyyyyyyyyyyyyyyyyy
    startup_script: install-nodejs.sh       # file under ./startup-scripts/
    additional_packages: [jq, unzip]        # installed via apt/dnf/apk/... autodetected
    watchdog:
      enabled: true
      interval: 60

  # Yet another flavor, for jobs that need bookworm specifically.
  - title: bookworm-01
    repo_url: https://github.com/your-org/your-repo
    image: debian:bookworm
    pat: github_pat_yyyyyyyyyyyyyyyyyyyy

  # Runner that needs access to `docker` inside its jobs (docker build,
  # docker run, testcontainers, ...). The host docker socket is
  # bind-mounted into the container; the docker CLI is installed at
  # container start. All runners that share this `image:` inherit the
  # socket mount (docker grouping is per compose-service).
  - title: docker-runner-01
    repo_url: https://github.com/your-org/your-repo
    image: debian:stable-slim
    pat: github_pat_yyyyyyyyyyyyyyyyyyyy
    docker:
      enabled: true

  # Auto-scaling pool: never fewer than 2 runners, always keep 3 idle
  # ready to pick up a job (so jobs don't wait for a cold spin-up),
  # never exceed 15 total. Each live instance is named
  # `pool-runner-01`, `pool-runner-02`, ... on GitHub.
  - title: pool-runner
    repo_url: https://github.com/your-org/your-repo
    pat: github_pat_yyyyyyyyyyyyyyyyyyyy
    instances:
      min: 2
      max: 15
      headroom: 3
