name: Multirunner Tester
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: [self-hosted, linux, x64, scope:general, image:debian:stable-slim]
    steps:
      - name: Say hello from bash
        run: bash -c "echo \"Hello from the multirunner test workflow; Running on $(hostname)\""
      - name: Compute Primes
        run: bash -c "echo \"Computing primes\" && seq 2 100000000 | factor | awk 'NF==2{print \$1}'"
